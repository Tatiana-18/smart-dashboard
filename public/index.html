<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <base href="/smart-dashboard/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#8B5CF6" />
  <meta name="description" content="Smart Dashboard PWA - Tasks, Notes and Tracker" />
  <!-- Content Security Policy для GitHub Pages -->
  <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; 
               img-src 'self' data: https:; 
               style-src 'self' 'unsafe-inline'; 
               script-src 'self' 'unsafe-inline'; 
               manifest-src 'self'; 
               connect-src 'self' https:;">
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json" />
  
  <!-- Icons -->
  <link rel="icon" type="image/png" href="./favicon.ico" />
  <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
  
  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Smart Dashboard" />
  
  <!-- Styles - ОТНОСИТЕЛЬНЫЕ ПУТИ (src внутри public) -->
  <link rel="stylesheet" href="./src/styles/reset.css" />
  <link rel="stylesheet" href="./src/styles/variables.css" />
  <link rel="stylesheet" href="./src/styles/main.css" />
  
  <!-- Module Styles -->
  <link rel="stylesheet" href="./src/modules/tasks/tasks.css" />
  <link rel="stylesheet" href="./src/modules/notes/notes.css" />
  <link rel="stylesheet" href="./src/modules/tracker/tracker.css" />
  
  <title>Smart Dashboard</title>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">✨ Smart Dashboard</div>
    <div class="profile-btn" id="profileBtn">Т</div>
  </header>

  <!-- Mascot (Лисичка 🦊) -->
  <div class="mascot" id="mascot">
    <span class="mascot-emoji">🦊</span>
    <div class="mascot-text">Привет! Готов к новым достижениям?</div>
  </div>

  <!-- Main Content Container -->
  <div class="main-content">
    <!-- Tasks Module -->
    <section id="tasks" class="module active">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="household">🏠 Бытовые</button>
        <button class="filter-btn" data-filter="health">💧 Здоровье</button>
        <button class="filter-btn" data-filter="habit">⭐ Привычки</button>
        <button class="filter-btn" data-filter="other">📋 Другое</button>
      </div>

      <div id="tasksList"></div>

      <button class="btn" id="addTaskBtn">+ Добавить задачу</button>

      <div class="card" id="streakCard">
        <div style="text-align:center;font-weight:600;color:var(--secondary);">
          🔥 СТРИК: 0 дней подряд!
        </div>
      </div>
    </section>

    <!-- Notes Module -->
    <section id="notes" class="module">
      <div id="notesList"></div>
      <button class="btn" id="addNoteBtn">+ Новая заметка</button>
    </section>

    <!-- Tracker Module -->
    <section id="tracker" class="module">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card" id="progressCard"></div>
      <div id="badgesList" class="badges"></div>
    </section>

    <!-- Profile Module -->
    <section id="profile" class="module">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">Т</div>
        <div class="profile-name" id="profileName">Татьяна</div>
        <div class="profile-email" id="profileEmail">user@example.com</div>
      </div>
      <div class="card" id="profileStats"></div>
      <div class="card" id="profileSettings"></div>
      <!-- Admin Panel Link (only for admins) -->
<div id="adminLinkContainer" style="display:none;margin:12px 20px;">
  <a href="./admin.html" class="btn btn-outline" style="display:block;text-align:center;text-decoration:none;color:var(--primary);padding:16px;border:2px solid var(--primary);border-radius:12px;font-weight:600;">
    👑 Панель администратора
  </a>
</div>

<!-- Logout Button -->
      <button class="btn btn-outline" id="logoutBtn" style="margin:12px 20px;">
        Выйти из аккаунта
      </button>
    </section>
  </div>

  <!-- Bottom Navigation -->
  <nav class="nav-bar">
    <div class="nav-item active" data-target="tasks">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M16 12V4H8v8c0 2.21-1.79 4-4 4v2h4v4h8v-4h4v-2c-2.21 0-4-1.79-4-4zm-6 0V6h4v6c0 1.1-.9 2-2 2s-2-.9-2-2z"/>
      </svg>
      <span>Задачи</span>
    </div>
    <div class="nav-item" data-target="notes">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
      </svg>
      <span>Заметки</span>
    </div>
    <div class="nav-item" data-target="tracker">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      <span>Трекер</span>
    </div>
    <div class="nav-item" data-target="profile">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
      <span>Профиль</span>
    </div>
  </nav>

      <!-- Scripts - Core (СТРОГО ВАЖНЫЙ ПОРЯДОК!) -->
  <script src="./src/core/config.js"></script>
  <script src="./src/core/notifications.js"></script>
  <script src="./src/core/authService.js"></script>
  <script src="./src/core/dataService.js"></script>
  <script src="./src/core/cacheService.js"></script>
  <script src="./src/core/uiContainer.js"></script>
  <script src="./src/core/mascot.js"></script>
  <script src="./src/core/router.js"></script>
  
  <!-- Scripts - Modules -->
  <script src="./src/modules/tasks/tasksDummyData.js"></script>
  <script src="./src/modules/tasks/tasks.js"></script>
  <script src="./src/modules/tasks/tasksUI.js"></script>
  <script src="./src/modules/notes/notesDummyData.js"></script>
  <script src="./src/modules/notes/notes.js"></script>
  <script src="./src/modules/notes/notesUI.js"></script>
  <script src="./src/modules/tracker/tracker.js"></script>
  <script src="./src/modules/tracker/trackerUI.js"></script>
  <script src="./src/modules/profile/profile.js"></script>
  
  <!-- Main Script -->
  <script src="./src/main.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./src/serviceWorker.js')
          .then(registration => {
            console.log('✅ Service Worker registered:', registration);
          })
          .catch(error => {
            console.error('❌ Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
